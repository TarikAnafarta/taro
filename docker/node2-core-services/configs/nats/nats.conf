# NATS Server Configuration for Taro
# ====================================
# Primary NATS server running on Node 2.
# Node 1 connects to this server.

# Server name for identification
server_name: taro-nats

# Client connections
port: 4222

# HTTP monitoring
http_port: 8222

# WebSocket support (for dashboard real-time updates)
websocket {
  port: 8443
  no_tls: true
}

# JetStream — persistent messaging
jetstream {
  store_dir: /data/jetstream
  max_mem: 256MB
  max_file: 1GB
}

# Logging
debug: false
trace: false
logtime: true

# Limits
max_payload: 8MB
max_connections: 256
