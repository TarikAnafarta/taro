[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "taro-common"
version = "0.1.0"
description = "Shared library for Taro — a personal AI operating system"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "nats-py>=2.0",
    "structlog>=23.0",
    "httpx>=0.25.0",
]

[project.optional-dependencies]
dev = [
    "pytest",
    "pytest-asyncio",
    "ruff",
    "mypy",
]

[tool.hatch.build.targets.wheel]
packages = ["taro_common"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.mypy]
python_version = "3.12"
strict = true
